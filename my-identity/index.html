<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Identity</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="container">
        <h1>My Identity</h1>
        <p class="name">By Edward L.</p>
        <section class="visible">
          <h2>Things You Can See About Me</h2>
          <section class="item math"></section>
          <section class="item programming"></section>
          <section class="item science"></section>
          <section class="item cycling"></section>
          <section class="item books"></section>
          <section class="item uni"></section>
        </section>
        <section class="invisible">
          <h2>Things You Can't See About Me</h2>
          <section class="item growth"></section>
          <section class="item honesty"></section>
          <section class="item time-management"></section>
          <section class="item organization"></section>
          <section class="item env"></section>
          <section class="item school"></section>
        </section>
        <section class="quote-section">
          <h2>A Quote That Represents Me</h2>
          <p class="quote-text">"Happiness depends upon ourselves" - Aristotle</p>
          <p class="quote-desc">
            This quote shows that I have a responsibility for finding my own happiness, regardless
            of circumstances life puts me in.
          </p>
        </section>
      </section>
    </main>
  </body>
</html>
